name: macos

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.24.x]
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install tools
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Test
        run: |
          go test -failfast --covermode=atomic -race ./...
